version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
    groups:
      dotnet-core:
        patterns:
          - "System.*"
          - "Microsoft.AspNetCore.*"
          - "Microsoft.Extensions.*"
      aspire-hosting:
        patterns:
          - "Aspire.Hosting"
          - "Aspire.Hosting.*"
      open-telemetry:
        patterns:
          - "OpenTelemetry"
          - "OpenTelemetry.*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "dotnet-sdk"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
