name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true

jobs:
  build-and-test:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: ⚙️ Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: 📦 Restore
        run: dotnet restore AlexCrome.Aspire.slnx

      - name: 🔨 Build
        run: dotnet build AlexCrome.Aspire.slnx --no-restore --configuration Release

      - name: 🔒 Trust dev certs
        run: dotnet dev-certs https --trust
        continue-on-error: true

      - name: 🧪 Test
        run: dotnet test --configuration Release

  publish:
    name: 📦 Publish
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: ⚙️ Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          source-url: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Calculate Version
        id: version
        run: echo "VERSION=0.0.${{ github.run_number }}-preview" >> $GITHUB_OUTPUT

      - name: 📦 Pack
        run: dotnet pack src/AlexCrome.Aspire.Hosting.UserJwts.csproj --configuration Release --output ./nupkg -p:Version=${{ steps.version.outputs.VERSION }}

      - name: 🚀 Publish to GitHub Packages
        run: dotnet nuget push ./nupkg/*.nupkg --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate
