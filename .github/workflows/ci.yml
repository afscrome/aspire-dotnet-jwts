name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest
    env:
      ARTIFACTS_PATH: ${{ github.workspace }}/.artifacts/
      BINLOG_PATH: ${{ github.workspace }}/.artifacts/binlogs/
      TESTRESULTS_PATH: ${{ github.workspace }}/.artifacts/testresults/
      NUGET_PACKAGES_PATH: ${{ github.workspace }}/.artifacts/package/release/
      NUGET_XMLDOC_MODE: skip
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      DOTNET_SYSTEM_CONSOLE_ALLOW_ANSI_COLOR_REDIRECTION: true
      TERM: xterm

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: 🔨 Build .NET artifacts
        uses: ./.github/actions/dotnet-build
        with:
          dotnet-version: '10.0.x'
          solution-path: UserJwts.slnx
          configuration: Release

  publish:
    name: 📦 Publish
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      packages: write

    steps:
      - name: ⚙️ Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          source-url: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📥 Download packages
        uses: actions/download-artifact@v5
        with:
          name: NuGetPackages
          path: packages

      - name: 🚀 Publish to GitHub Packages
        run: dotnet nuget push packages/*.nupkg --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate
